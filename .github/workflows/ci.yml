name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Train bundled models
        run: |
          # CI has no GPU data — skip training, rely on hard-coded rule fallback
          echo "Skipping model training in CI (no Stage 1 CSV available)"

      - name: Test
        run: pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check theta/ --select E,F,W --ignore E501

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t somisett/agent:ci .

      - name: Smoke test (demo mode)
        run: docker run --rm somisett/agent:ci --help

      - name: Tag and push (main only)
        # Only runs on a push to main AND when the Docker Hub secret is set.
        # If DOCKER_USERNAME is unset, this step is skipped (not failed), so CI
        # stays green until publishing is configured.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.DOCKER_USERNAME != ''
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker tag somisett/agent:ci somisett/agent:latest
          docker push somisett/agent:latest
